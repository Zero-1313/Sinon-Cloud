<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sinon Cloud OS</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background-color: #f0f4ff;
  overflow: hidden;
}

/* Opening Screen */
.opening-screen {
  position: fixed;
  inset: 0;
  background: #1e2a3a;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 2rem;
  z-index: 9999;
  animation: fadeOut 3s forwards;
  animation-delay: 2s;
}

.opening-logo {
  opacity: 0;
  font-weight: bold;
  animation: fadeIn 1.5s ease-out forwards;
}

@keyframes fadeIn { to { opacity: 1; transform: scale(1.05); } }
@keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

/* Login */
.login-container {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.login-box {
  background: #ffffff;
  padding: 2rem;
  border-radius: 1rem;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  width: 340px;
  text-align: center;
}

.login-box h2 {
  margin-bottom: 1.5rem;
  color: #1e2a3a;
}

.login-box input {
  width: 100%;
  padding: 0.8rem;
  margin: 0.6rem 0;
  border: 1px solid #d0d7e2;
  border-radius: 8px;
  outline: none;
  font-size: 0.9rem;
}

.login-box input:focus { border-color: #1e2a3a; }

.login-box button {
  width: 100%;
  padding: 0.9rem;
  margin-top: 1rem;
  border-radius: 8px;
  border: none;
  background: #1e2a3a;
  color: white;
  font-weight: 600;
  cursor: pointer;
  transition: 0.3s;
}

.login-box button:hover { background: #2d3e55; }

/* Success Overlay */
.success-screen {
  position: fixed;
  inset: 0;
  background: #0f0f0f;
  color: #00ffcc;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  font-family: monospace;
  z-index: 9999;
  animation: fadeIn 0.6s ease-in-out;
}
</style>
</head>

<body>

<div class="opening-screen" id="openingScreen">
  <div class="opening-logo">Sinon Cloud</div>
</div>

<div class="login-container">
  <div class="login-box">
    <h2>Login SC-OS</h2>
    <form id="loginForm">
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCBcW_khcw7dQQ1IQlzVQ-ALI8h7r0rkGE",
  authDomain: "sinon-cloud-os.firebaseapp.com",
  databaseURL: "https://sinon-cloud-os-default-rtdb.asia-southeast1.firebasedatabase.app/",
  projectId: "sinon-cloud-os",
  storageBucket: "sinon-cloud-os.firebasestorage.app",
  messagingSenderId: "854460809293",
  appId: "1:854460809293:web:50788188a1bdf4153f5c04",
  measurementId: "G-N470NQC219"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database(); // Realtime Database

/* Opening */
window.addEventListener('DOMContentLoaded', () => {
  setTimeout(() => {
    document.getElementById('openingScreen').style.display = 'none';
    document.body.style.overflow = 'auto';
  }, 3000);
});

/* Login */
document.getElementById("loginForm").addEventListener("submit", function(e) {
  e.preventDefault();
  
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  
  auth.signInWithEmailAndPassword(email, password)
    .then(userCredential => {
      const uid = userCredential.user.uid;
      
      return db.ref('users/' + uid).once('value');
    })
    .then(snapshot => {
      if (snapshot.exists()) {
        const data = snapshot.val();
        localStorage.setItem("userdata", JSON.stringify(data));
        showSuccessAnimation(data.role);
      } else {
        alert("User data not found.");
      }
    })
    .catch(error => {
      alert("Login Failed: " + error.message);
    });
});

function showSuccessAnimation(role) {
  const overlay = document.createElement("div");
  overlay.classList.add("success-screen");
  overlay.innerHTML = `
    <h1>ACCESS GRANTED</h1>
    <p>Loading Home...</p>
  `;
  document.body.appendChild(overlay);
  
  setTimeout(() => {
  window.location.href = "asset/home.html";
}, 2500);
}
</script>

</body>
</html>
